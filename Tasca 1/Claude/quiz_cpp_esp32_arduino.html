<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qüestionari C++ per a ESP32 i Arduino</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f5f4f0;
    --surface:   #ffffff;
    --surface2:  #f0ede8;
    --border:    #e0dcd5;
    --text:      #1a1916;
    --text-sec:  #6b6760;
    --text-muted:#9e9b96;
    --accent:    #2d6be4;
    --accent-bg: #edf2fd;
    --accent-bdr:#b8cef7;
    --ok:        #1a7a4a;
    --ok-bg:     #eaf5ee;
    --ok-bdr:    #9dd4b5;
    --err:       #c0392b;
    --err-bg:    #fdf0ee;
    --err-bdr:   #f0b3ac;
    --mono:      'JetBrains Mono', 'Fira Mono', 'Courier New', monospace;
    --radius:    6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #141412;
      --surface:   #1e1d1b;
      --surface2:  #252421;
      --border:    #2e2d2a;
      --text:      #e8e5df;
      --text-sec:  #9b9790;
      --text-muted:#6b6860;
      --accent:    #5a8ef0;
      --accent-bg: #1a2540;
      --accent-bdr:#2c4a80;
      --ok:        #4ade80;
      --ok-bg:     #0f2a1c;
      --ok-bdr:    #1a5c38;
      --err:       #f87171;
      --err-bg:    #2a0f0f;
      --err-bdr:   #6b1a1a;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .quiz-wrap {
    max-width: 720px;
    margin: 0 auto;
  }

  /* Header */
  .quiz-header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }
  .quiz-icon {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    background: var(--accent-bg);
    border: 1px solid var(--accent-bdr);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .quiz-icon svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.8; }
  .quiz-header h1 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .quiz-header p  { font-size: 14px; color: var(--text-sec); }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 12px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* Question card */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .q-body {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .q-num {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .q-text {
    font-size: 16px;
    color: var(--text);
    line-height: 1.65;
    font-weight: 400;
  }
  code {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    color: var(--text);
  }

  /* Options */
  .opts {
    padding: 0;
    list-style: none;
  }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 1.5rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    background: var(--surface);
    transition: background 0.12s;
    font-size: 15px;
    color: var(--text);
    line-height: 1.55;
    width: 100%;
    text-align: left;
    border-left: none;
    border-right: none;
    border-top: none;
  }
  .opt:last-child { border-bottom: none; }
  .opt:hover { background: var(--surface2); }
  .opt:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .opt-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    min-width: 24px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-sec);
    flex-shrink: 0;
    margin-top: 1px;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .opt.correct            { background: var(--ok-bg); color: var(--ok); cursor: default; pointer-events: none; }
  .opt.correct .opt-badge { background: var(--ok); border-color: var(--ok); color: #fff; }
  .opt.wrong              { background: var(--err-bg); color: var(--err); cursor: default; pointer-events: none; }
  .opt.wrong .opt-badge   { background: var(--err); border-color: var(--err); color: #fff; }
  .opt.reveal             { background: var(--ok-bg); color: var(--ok); cursor: default; pointer-events: none; opacity: 0.7; }
  .opt.reveal .opt-badge  { background: var(--ok); border-color: var(--ok); color: #fff; }
  .opt.disabled           { cursor: default; pointer-events: none; }

  /* Feedback */
  .feedback {
    display: none;
    margin: 0;
    padding: 14px 1.5rem;
    font-size: 14px;
    line-height: 1.6;
    border-top: 1px solid var(--border);
  }
  .feedback.show { display: flex; gap: 10px; align-items: flex-start; }
  .feedback.ok   { background: var(--ok-bg); color: var(--ok); border-color: var(--ok-bdr); }
  .feedback.err  { background: var(--err-bg); color: var(--err); border-color: var(--err-bdr); }
  .feedback-icon { font-size: 16px; flex-shrink: 0; line-height: 1.6; }

  /* Next button */
  .q-footer {
    padding: 1rem 1.5rem;
    display: flex;
    justify-content: flex-end;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }
  .btn-next {
    display: none;
    padding: 9px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-next:hover { opacity: 0.88; }
  .btn-next:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn-next.show { display: inline-block; }

  /* Results */
  #results { display: none; }
  #results.show { display: block; }

  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem 1.5rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .score-num {
    font-size: 52px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -2px;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }
  .score-sub {
    font-size: 15px;
    color: var(--text-sec);
    margin: 6px 0 1.25rem;
  }
  .score-meter {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    max-width: 280px;
    margin: 0 auto;
  }
  .score-meter-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s ease;
  }
  .score-msg {
    margin-top: 12px;
    font-size: 14px;
    color: var(--text-sec);
    font-style: italic;
  }

  /* Review list */
  .review-header {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .review-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 8px;
    font-size: 14px;
    line-height: 1.6;
  }
  .review-item.ok  { border-left: 3px solid var(--ok);  background: var(--ok-bg); }
  .review-item.err { border-left: 3px solid var(--err); background: var(--err-bg); }
  .review-q    { font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .review-ans  { font-size: 13px; color: var(--text-sec); margin-bottom: 2px; }
  .review-ans span { font-weight: 500; }
  .review-corr { font-size: 13px; color: var(--ok); margin-bottom: 6px; }
  .review-corr span { font-weight: 500; }
  .review-exp  { font-size: 13px; color: var(--text-sec); border-top: 1px solid var(--border); padding-top: 8px; margin-top: 6px; }

  .btn-restart {
    display: block;
    width: 100%;
    margin-top: 1.5rem;
    padding: 11px;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    cursor: pointer;
    transition: background 0.12s;
    font-weight: 500;
  }
  .btn-restart:hover { background: var(--surface2); }
  .btn-restart:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  @media (max-width: 480px) {
    body { padding: 1rem 0.75rem; }
    .q-body, .q-footer, .opts .opt, .feedback { padding-left: 1rem; padding-right: 1rem; }
    .score-num { font-size: 40px; }
  }
</style>
</head>
<body>

<div class="quiz-wrap" role="main">

  <header class="quiz-header">
    <div class="quiz-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    </div>
    <div>
      <h1>C++ per a ESP32 i Arduino</h1>
      <p>25 preguntes sobre programació i diferències entre plataformes</p>
    </div>
  </header>

  <div class="progress-row" aria-live="polite" aria-atomic="true">
    <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="25" id="pbar-wrap">
      <div class="progress-fill" id="pbar" style="width:0%"></div>
    </div>
    <span class="progress-label" id="plabel">0 / 25</span>
  </div>

  <div id="quiz-area">
    <section class="q-card" id="qcard" aria-label="Pregunta actual">
      <div class="q-body">
        <div class="q-num" id="qnum"></div>
        <p class="q-text" id="qtext"></p>
      </div>
      <ul class="opts" id="opts" role="list"></ul>
      <div class="feedback" id="feedback" aria-live="polite" aria-atomic="true">
        <span class="feedback-icon" id="fb-icon"></span>
        <span id="fb-text"></span>
      </div>
      <div class="q-footer">
        <button class="btn-next" id="nextbtn" type="button"></button>
      </div>
    </section>
  </div>

  <div id="results" aria-label="Resultats del qüestionari">
    <div class="score-card">
      <div class="score-num" id="score-num"></div>
      <div class="score-sub" id="score-sub"></div>
      <div class="score-meter"><div class="score-meter-fill" id="score-fill"></div></div>
      <div class="score-msg" id="score-msg"></div>
    </div>
    <div class="review-header">Retroalimentació detallada</div>
    <div id="review-list"></div>
    <button class="btn-restart" type="button" onclick="restart()">Tornar a començar</button>
  </div>

</div>

<script>
const QS = [
  {q:"Quina és la freqüència de rellotge típica de l'ESP32 en comparació amb l'Arduino UNO?",opts:["Arduino UNO: 240 MHz, ESP32: 16 MHz","ESP32: 240 MHz, Arduino UNO: 16 MHz","Ambdós funcionen a 240 MHz","Ambdós funcionen a 16 MHz"],ans:1,exp:"L'ESP32 integra un processador dual-core Xtensa LX6 a fins a 240 MHz, mentre que l'Arduino UNO usa un ATmega328P a 16 MHz — 15 vegades més lent."},
  {q:"Quin d'aquests perifèrics integra l'ESP32 que l'Arduino UNO NO té de sèrie?",opts:["PWM","UART","Wi-Fi i Bluetooth","SPI"],ans:2,exp:"L'ESP32 incorpora Wi-Fi 802.11 b/g/n i Bluetooth 4.2/BLE al propi xip. L'Arduino UNO no té connectors sense fil — s'hi han d'afegir mòduls externs."},
  {q:"A l'ESP32, com s'inicialitza el port sèrie en Arduino Framework (baudrate 115200)?",opts:["Serial.begin(9600);","UART.init(115200);","Serial.begin(115200);","Serial0.start(115200);"],ans:2,exp:"La funció Serial.begin() és estàndard en Arduino Framework, tant per a Arduino com per a ESP32. S'hi passa el baudrate com a argument."},
  {q:"Quina és la tensió de funcionament dels pins GPIO de l'ESP32?",opts:["5 V (com l'Arduino UNO)","3.3 V","1.8 V","12 V"],ans:1,exp:"L'ESP32 opera a 3.3 V. Connectar directament senyals de 5 V als seus pins pot danyar-lo. L'Arduino UNO, en canvi, treballa a 5 V."},
  {q:"A l'Arduino UNO, la funció analogRead() retorna valors entre 0 i 1023 (10 bits). Quin rang té l'ESP32 per defecte?",opts:["0-255 (8 bits)","0-1023 (10 bits)","0-4095 (12 bits)","0-65535 (16 bits)"],ans:2,exp:"L'ESP32 té un ADC de 12 bits, amb un rang per defecte de 0-4095. Això ofereix major resolució que el de 10 bits de l'Arduino UNO."},
  {q:"Quin tipus d'estructura permet gestionar tasques en paral·lel a l'ESP32 gràcies a FreeRTOS?",opts:["Threads POSIX","Tasks (xTaskCreate)","Goroutines","Coroutines de C++20"],ans:1,exp:"L'ESP32 integra FreeRTOS, i es creen tasques amb xTaskCreate(). L'Arduino UNO estàndard no té sistema operatiu en temps real — tot s'executa de forma seqüencial al loop()."},
  {q:"Com s'encén el LED integrat a l'Arduino UNO (pin 13)?",opts:["digitalWrite(LED_BUILTIN, HIGH);","led.on();","GPIO.write(13, 1);","PIN_13 = HIGH;"],ans:0,exp:"La macro LED_BUILTIN i la funció digitalWrite() funcionen tant a Arduino com a ESP32 (on normalment el LED integrat és al pin 2), fent el codi portable."},
  {q:"Quina funció s'usa a l'Arduino Framework per llegir l'estat d'un pin digital?",opts:["readPin()","GPIO.read()","digitalRead()","pinState()"],ans:2,exp:"digitalRead(pin) és la funció estàndard per llegir pins digitals en Arduino Framework. Retorna HIGH o LOW i funciona igual a Arduino i ESP32."},
  {q:"Quin és el nombre màxim de pins GPIO disponibles a l'ESP32 (WROOM-32) en comparació amb l'Arduino UNO?",opts:["Arduino UNO: 34 pins GPIO, ESP32: 14","ESP32: ~34 pins GPIO, Arduino UNO: 14 digitals + 6 analògics","Ambdós tenen 20 pins GPIO","ESP32: 14 GPIO, Arduino UNO: 34"],ans:1,exp:"L'ESP32 WROOM-32 exposa ~34 pins GPIO, molts amb funcions múltiples. L'Arduino UNO té 14 pins digitals i 6 d'analògics — significativament menys."},
  {q:"A l'ESP32, quin mètode s'usa per connectar-se a una xarxa Wi-Fi?",opts:["Network.connect(ssid, pass);","WiFi.begin(ssid, password);","ESP32.wifi(ssid, pass);","Ethernet.begin(ssid);"],ans:1,exp:"La biblioteca WiFi de l'ESP32 framework usa WiFi.begin(ssid, password). Després es pot comprovar l'estat amb WiFi.status() == WL_CONNECTED."},
  {q:"Quina macro s'usa a l'ESP32 per forçar l'execució d'una funció des de la IRAM?",opts:["IRAM_ATTR","CORE0_TASK","__attribute__((core0))","No és possible especificar el nucli"],ans:0,exp:"IRAM_ATTR força que una funció s'emmagatzemi a la IRAM i s'executi ràpidament, essencial per a ISR. Per assignar tasques a nuclis concrets s'usa xTaskCreatePinnedToCore()."},
  {q:"Quin és el principal avantatge de la funció millis() sobre delay() a Arduino i ESP32?",opts:["millis() és més ràpida","millis() permet temporització no bloquejant","millis() usa menys memòria","No hi ha diferència pràctica"],ans:1,exp:"millis() retorna el temps transcorregut i permet crear retards no bloquejants: el processador pot fer altres tasques mentre espera. delay() bloqueja tota l'execució, cosa crítica a l'ESP32 on pot afectar el watchdog."},
  {q:"A l'ESP32, quin és el problema de usar delay() en tasques FreeRTOS?",opts:["No és compatible amb FreeRTOS","Pot disparar el watchdog timer (WDT) i reiniciar el sistema","Ocupa massa RAM","Canvia la freqüència del rellotge"],ans:1,exp:"L'ESP32 té un Watchdog Timer. Usar delay() llargs en tasques FreeRTOS pot impedir que el WDT es reseti, provocant un reinici del sistema. S'ha d'usar vTaskDelay() o alimentar el WDT manualment."},
  {q:"Quin és el tipus de memòria Flash típica de l'ESP32 en comparació amb l'Arduino UNO?",opts:["Arduino UNO: 4 MB, ESP32: 32 KB","ESP32: 4 MB (o més), Arduino UNO: 32 KB","Ambdós: 256 KB","ESP32: 32 KB, Arduino UNO: 4 MB"],ans:1,exp:"L'ESP32 sol tenir 4 MB de Flash externa (o fins a 16 MB en alguns mòduls). L'Arduino UNO té només 32 KB de Flash integrada — una diferència de factor 125."},
  {q:"Com es declara correctament una funció d'interrupció (ISR) a l'ESP32?",opts:["void ISR handler(){}","void IRAM_ATTR myISR(){}","interrupt void myISR(){}","#pragma interrupt myISR"],ans:1,exp:"A l'ESP32, les ISR han d'anar a la IRAM per executar-se ràpidament i s'han de declarar amb IRAM_ATTR. A l'Arduino UNO no cal. S'adjunten amb attachInterrupt()."},
  {q:"Quina biblioteca s'usa habitualment per fer un servidor web senzill a l'ESP32?",opts:["Ethernet.h","WebServer.h (o ESPAsyncWebServer)","HTTPServer.h","TCPServer.h"],ans:1,exp:"WebServer.h és la biblioteca estàndard per a servidors web a l'ESP32 en Arduino Framework. ESPAsyncWebServer és una alternativa asíncrona molt popular. Res d'això existeix per a l'Arduino UNO sense shields addicionals."},
  {q:"Quantes UART hardware té l'ESP32 en comparació amb l'Arduino UNO?",opts:["Ambdós: 1 UART","ESP32: 3 UART, Arduino UNO: 1 UART","Arduino UNO: 3 UART, ESP32: 1","Ambdós: 2 UART"],ans:1,exp:"L'ESP32 té 3 ports UART hardware (UART0, UART1, UART2), mentre que l'Arduino UNO només en té 1. Això permet a l'ESP32 comunicar-se amb múltiples perifèrics sèrie simultàniament."},
  {q:"Quin és el rol de la funció setup() a Arduino Framework (Arduino i ESP32)?",opts:["S'executa en bucle continu","S'executa una vegada en arrencar","S'executa cada segon","És opcional"],ans:1,exp:"setup() és la funció d'inicialització: s'executa una sola vegada en arrencar o reiniciar el sistema. Serveix per configurar pins, inicialitzar biblioteques, etc. Funciona igual a Arduino i ESP32."},
  {q:"A l'ESP32, com s'emmagatzema de forma permanent una variable en la memòria NVS?",opts:["EEPROM.put() igual que Arduino","Preferences.putInt(\"clau\", valor);","File.write() a LittleFS","SD.write()"],ans:1,exp:"L'ESP32 usa la biblioteca Preferences (basada en NVS de ESP-IDF) per a emmagatzematge clau-valor persistent. L'Arduino UNO usa EEPROM.put(). Ambdós persisteixen les dades després d'un reinici."},
  {q:"Quin és el significat de pinMode(pin, INPUT_PULLUP) i on funciona?",opts:["Activa una resistència pull-up interna; funciona en ambdós","Configura sortida; només Arduino","Activa pull-down; només ESP32","Habilita ADC; ambdós"],ans:0,exp:"INPUT_PULLUP activa la resistència de pull-up interna del pin, útil per a botons sense resistències externes. Funciona tant a Arduino UNO com a l'ESP32, tot i que la resistència interna de l'ESP32 és lleugerament diferent (~45 kΩ vs ~20-50 kΩ de l'AVR)."},
  {q:"Quina és la diferència entre Serial.print() i Serial.println()?",opts:["println() és més ràpida","println() afegeix un salt de línia al final","print() no funciona a l'ESP32","No hi ha diferència"],ans:1,exp:"println() afegeix '\\r\\n' al final de la cadena, mentre que print() no. Funcionen igual a Arduino i ESP32. Es fan servir per depurar via el monitor sèrie."},
  {q:"Com es pot usar el Bluetooth Classic de l'ESP32 per enviar dades?",opts:["Bluetooth.send(data);","SerialBT.println(data); amb #include <BluetoothSerial.h>","BT.write(data);","No és possible sense hardware extern"],ans:1,exp:"La biblioteca BluetoothSerial.h (inclosa en ESP32 Arduino framework) permet usar Bluetooth Classic com si fos un port sèrie. L'Arduino UNO no té Bluetooth integrat."},
  {q:"Quin és el problema comú amb les variables compartides entre una ISR i el codi principal?",opts:["No es poden compartir variables","Les variables s'han de declarar com volatile","La ISR ha d'usar tipus float","Cal usar FreeRTOS Queues sempre"],ans:1,exp:"El compilador pot optimitzar i no llegir una variable des de la memòria si creu que no canvia. volatile força la lectura des de la memòria real. És vàlid tant per a Arduino UNO com per a ESP32."},
  {q:"Quin framework oficial d'Espressif permet accedir a totes les funcions de l'ESP32 sense capa Arduino?",opts:["ESP-SDK","ESP-IDF (IoT Development Framework)","ESP-RTOS","Espressif-Core"],ans:1,exp:"ESP-IDF és el framework oficial d'Espressif per a l'ESP32, que dona accés complet a FreeRTOS, drivers, i totes les funcions avançades. Arduino Framework és una capa d'abstracció sobre ESP-IDF."},
  {q:"Quina consideració és important quan es fan lectures analògiques (ADC) a l'ESP32 mentre el Wi-Fi està actiu?",opts:["El Wi-Fi augmenta la precisió","L'ADC2 no es pot usar mentre el Wi-Fi està actiu","El Wi-Fi desactiva tots els ADC","No hi ha cap interferència"],ans:1,exp:"L'ESP32 té dues unitats ADC: ADC1 (pins GPIO32-39) i ADC2. ADC2 comparteix recursos amb el Wi-Fi: quan el Wi-Fi està actiu, ADC2 no es pot usar o dona lectures incorrectes. Sempre usa ADC1 (GPIO32-39) si tens Wi-Fi actiu."}
];

let cur = 0, score = 0, answered = false, userAnswers = [];
const LETTERS = ['A','B','C','D'];
const MSGS = [
  [0,  40,  "Continua practicant, la teoria porta a la mestria."],
  [40, 60,  "Bon punt de partida! Repassa les diferències clau."],
  [60, 80,  "Bon resultat! Domines bona part de les dues plataformes."],
  [80, 100, "Excel·lent! Tens un domini sòlid d'ESP32 i Arduino."]
];

function render() {
  const q = QS[cur];
  document.getElementById('qnum').textContent = `Pregunta ${cur + 1} de ${QS.length}`;
  document.getElementById('qtext').innerHTML = q.q;
  document.getElementById('pbar').style.width = Math.round((cur / QS.length) * 100) + '%';
  document.getElementById('pbar-wrap').setAttribute('aria-valuenow', cur);
  document.getElementById('plabel').textContent = `${cur} / ${QS.length}`;

  const ul = document.getElementById('opts');
  ul.innerHTML = '';
  q.opts.forEach((o, i) => {
    const li = document.createElement('li');
    li.setAttribute('role', 'listitem');
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.type = 'button';
    btn.innerHTML = `<span class="opt-badge">${LETTERS[i]}</span><span>${o}</span>`;
    btn.onclick = () => select(i);
    li.appendChild(btn);
    ul.appendChild(li);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  document.getElementById('fb-text').textContent = '';
  document.getElementById('fb-icon').textContent = '';

  const nb = document.getElementById('nextbtn');
  nb.className = 'next-btn';
  nb.textContent = cur < QS.length - 1 ? 'Següent pregunta →' : 'Veure resultats →';
  answered = false;
}

function select(i) {
  if (answered) return;
  answered = true;
  const q = QS[cur];
  const btns = document.querySelectorAll('.opt');
  btns.forEach((b, idx) => {
    b.classList.add('disabled');
    if (idx === q.ans) b.classList.add('correct');
    else if (idx === i && i !== q.ans) b.classList.add('wrong');
    else if (idx === q.ans && i !== q.ans) b.classList.add('reveal');
  });

  const ok = i === q.ans;
  if (ok) score++;
  userAnswers.push({ q: q.q, chosen: q.opts[i], correct: q.opts[q.ans], ok, exp: q.exp });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (ok ? 'ok' : 'err');
  document.getElementById('fb-icon').textContent = ok ? '✓' : '✗';
  document.getElementById('fb-text').textContent = (ok ? 'Correcte! ' : 'Incorrecte. ') + q.exp;
  document.getElementById('nextbtn').className = 'next-btn show';
}

document.getElementById('nextbtn').addEventListener('click', () => {
  cur++;
  if (cur >= QS.length) { showResults(); return; }
  render();
});

function showResults() {
  document.getElementById('pbar').style.width = '100%';
  document.getElementById('plabel').textContent = `${QS.length} / ${QS.length}`;
  document.getElementById('quiz-area').style.display = 'none';
  const res = document.getElementById('results');
  res.className = 'show';

  const pct = Math.round((score / QS.length) * 100);
  document.getElementById('score-num').textContent = `${score} / ${QS.length}`;
  document.getElementById('score-sub').textContent = `${pct}% de respostes correctes`;

  const fill = document.getElementById('score-fill');
  fill.style.width = '0%';
  fill.style.background = pct >= 80 ? '#1a7a4a' : pct >= 60 ? '#b97c10' : '#c0392b';
  setTimeout(() => { fill.style.width = pct + '%'; }, 80);

  const msg = MSGS.find(([lo, hi]) => pct >= lo && pct <= hi);
  document.getElementById('score-msg').textContent = msg ? msg[2] : '';

  const rev = document.getElementById('review-list');
  rev.innerHTML = '';
  userAnswers.forEach((a, i) => {
    const d = document.createElement('div');
    d.className = 'review-item ' + (a.ok ? 'ok' : 'err');
    let html = `<div class="review-q">${i + 1}. ${a.q}</div>`;
    if (!a.ok) {
      html += `<div class="review-ans">La teva resposta: <span>${a.chosen}</span></div>`;
      html += `<div class="review-corr">Resposta correcta: <span>${a.correct}</span></div>`;
    }
    html += `<div class="review-exp">${a.exp}</div>`;
    d.innerHTML = html;
    rev.appendChild(d);
  });
}

function restart() {
  cur = 0; score = 0; answered = false; userAnswers = [];
  document.getElementById('quiz-area').style.display = '';
  document.getElementById('results').className = '';
  render();
}

render();
</script>
</body>
</html>
